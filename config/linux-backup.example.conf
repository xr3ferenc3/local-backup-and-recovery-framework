# =============================================================================
# local-backup-and-recovery-framework - Linux Backup Configuration
# =============================================================================
#
# USAGE
#   Copy this file to config/linux-backup.conf and populate all required
#   fields for your environment. Pass the path to each script using the
#   --config flag.
#
#   Example:
#     ./linux/backup.sh --config config/linux-backup.conf
#
# WARNING
#   The live config file (linux-backup.conf) is excluded from version control
#   by .gitignore. Never commit a populated configuration file. It may contain
#   local paths and sensitive operational details.
#
# REFERENCE
#   See docs/linux-setup-guide.md for full configuration guidance.
#   See docs/command-reference.md for per-script flag reference.
#
# FORMAT
#   KEY="value"
#   All values must be quoted.
#   Boolean values use: true or false (lowercase, unquoted not required but
#   consistent quoting is recommended for shell sourcing reliability).
#   Array values use space-separated entries within quotes.
#   Lines beginning with # are comments and are ignored by the scripts.
# =============================================================================


# -----------------------------------------------------------------------------
# BACKUP - Core backup execution settings
# -----------------------------------------------------------------------------

# SOURCE_PATHS
# Space-separated list of absolute paths to back up.
# Each path is processed individually and logged separately.
# Minimum one path required.
# Example: SOURCE_PATHS="/home/admin /etc /var/www/html"
SOURCE_PATHS="/home/admin /etc /var/www/html"

# DESTINATION_ROOT
# Absolute path to the root directory where backup snapshots are written.
# Must exist before running backup.sh.
# The script creates dated snapshot subdirectories under this path.
# Example output: /mnt/backups/RHEL9-SRV01_2025-06-15_0200
DESTINATION_ROOT="/mnt/backups"

# BACKUP_HOST_LABEL
# Short identifier for this host. Used as a prefix in snapshot directory names.
# Use hostname or a meaningful short label. No spaces, no special characters.
# Recommended: match the system hostname.
# Example output: RHEL9-SRV01_2025-06-15_0200
BACKUP_HOST_LABEL="RHEL9-SRV01"

# INCREMENTAL_ENABLED
# Enable hard-link incremental snapshots using rsync --link-dest.
# When enabled, each snapshot contains a complete view of the source
# but only new or changed files consume additional disk space.
# Files unchanged since the previous snapshot are hard-linked to the
# previous snapshot, consuming no additional space.
# Disable only if your filesystem does not support hard links (rare).
# Recommended: "true"
INCREMENTAL_ENABLED="true"

# LINK_DEST_COUNT
# Number of previous snapshots to consider for hard-link deduplication.
# rsync --link-dest compares against the most recent snapshot.
# This value controls how many snapshots are retained for the link chain.
# Setting this higher than RETAIN_COUNT has no effect.
# Recommended: "1" (link against the immediately preceding snapshot)
LINK_DEST_COUNT="1"

# RSYNC_OPTIONS
# Additional rsync flags appended to the base command.
# The script always applies: -a --stats --log-file
# Do not add flags that conflict with -a (archive mode).
# Common additions:
#   --exclude-from  Use a separate exclude file (see EXCLUDE_FILE below)
#   --bwlimit       Bandwidth limit in KB/s (useful during business hours)
#   --timeout       Abort if no data transferred for N seconds
# Leave blank to use script defaults only.
RSYNC_OPTIONS="--timeout=120"

# EXCLUDE_PATTERNS
# Space-separated list of patterns to exclude from all source paths.
# Passed to rsync as --exclude entries.
# Wildcards supported. Patterns match relative to each source path root.
# Common exclusions: temp dirs, cache dirs, swap files, build artifacts.
EXCLUDE_PATTERNS="tmp/ temp/ cache/ .cache/ *.swp *.tmp *~"

# EXCLUDE_FILE
# Absolute path to a file containing one exclude pattern per line.
# Optional. Leave blank to use EXCLUDE_PATTERNS only.
# Useful when exclude lists are long or shared across multiple configs.
# See rsync(1) INCLUDE/EXCLUDE PATTERN RULES for pattern syntax.
EXCLUDE_FILE=""


# -----------------------------------------------------------------------------
# INTEGRITY - Post-backup verification settings
# -----------------------------------------------------------------------------
# Controls how verify-backup.sh performs integrity checks.

# VERIFY_FILE_COUNT
# Compare total file count between source and each snapshot.
# A mismatch indicates files were missed during the backup run.
# Recommended: "true"
VERIFY_FILE_COUNT="true"

# VERIFY_SIZE
# Compare total byte size between source and snapshot.
# A mismatch may indicate truncated or partially written files.
# Note: Hard-link inodes are counted once per inode, not per link.
# Size comparison uses du --apparent-size for consistency.
# Recommended: "true"
VERIFY_SIZE="true"

# SPOT_CHECK_ENABLED
# Enable SHA256 hash spot-checking of a random file sample.
# Confirms file content integrity beyond count and size comparison.
# Requires sha256sum (coreutils - available by default on RHEL 9).
# Recommended: "true"
SPOT_CHECK_ENABLED="true"

# SPOT_CHECK_SAMPLE_SIZE
# Number of files to include in the SHA256 spot-check sample.
# Selected randomly from the completed snapshot.
# Larger values increase confidence but extend verification time.
# Recommended range: 5 to 25.
SPOT_CHECK_SAMPLE_SIZE="10"

# MANIFEST_ENABLED
# Generate a SHA256 checksum manifest file at the completion of each
# backup run. The manifest is stored inside the snapshot directory as
# backup.manifest and is used by verify-backup.sh for full or targeted
# integrity checks. Required for restore.sh integrity pre-check.
# Recommended: "true"
MANIFEST_ENABLED="true"

# FAIL_ON_SIZE_DELTA_PERCENT
# Maximum acceptable size difference between source and snapshot as a
# percentage. Verification fails if the delta exceeds this value.
# Accounts for filesystem metadata and rsync overhead.
# Default: "5"
FAIL_ON_SIZE_DELTA_PERCENT="5"


# -----------------------------------------------------------------------------
# RETENTION - Snapshot retention and purge settings
# -----------------------------------------------------------------------------
# Controls how enforce-retention.sh manages old snapshots.

# RETAIN_DAYS
# Snapshots older than this number of days are eligible for purge.
# Age is measured from the timestamp embedded in the snapshot directory name.
# Default: "30"
# Minimum recommended: "7"
RETAIN_DAYS="30"

# MINIMUM_SNAPSHOTS_TO_KEEP
# Regardless of age, always retain at least this many snapshots.
# Prevents enforce-retention.sh from deleting all snapshots if the system
# is offline or backups fail for an extended period.
# Default: "3"
MINIMUM_SNAPSHOTS_TO_KEEP="3"

# DRY_RUN_RETENTION_BY_DEFAULT
# If "true", enforce-retention.sh runs in dry-run mode unless --force
# is explicitly passed on the command line.
# Prevents accidental deletion during initial deployment and testing.
# Recommended: "true"
DRY_RUN_RETENTION_BY_DEFAULT="true"


# -----------------------------------------------------------------------------
# LOGGING - Log output settings
# -----------------------------------------------------------------------------

# LOG_DIRECTORY
# Absolute path where log files are written.
# Must be writable by the account running the scripts.
# Created automatically if it does not exist.
# Recommended: co-locate with backups or use a dedicated log path.
LOG_DIRECTORY="/mnt/backups/logs"

# LOG_LEVEL
# Minimum log severity to write to the log file.
# Accepted values: DEBUG, INFO, WARN, ERROR
# DEBUG produces verbose output useful during initial setup and testing.
# INFO is recommended for production.
LOG_LEVEL="INFO"

# LOG_FORMAT
# Output format for log entries.
# Accepted values: json, text
# json is required for generate-report.sh to parse log data correctly.
# Do not change to text unless you are not using the reporting script.
LOG_FORMAT="json"

# LOG_RETENTION_DAYS
# Log files older than this number of days are deleted automatically
# at the start of each backup run.
# Set to "0" to disable automatic log rotation.
# Default: "90"
LOG_RETENTION_DAYS="90"


# -----------------------------------------------------------------------------
# REPORTING - Report generation settings
# -----------------------------------------------------------------------------
# Controls how generate-report.sh produces output.

# REPORT_OUTPUT_DIRECTORY
# Absolute path where generated reports are written.
# Must be writable. Created automatically if it does not exist.
# Reports are named using the snapshot label and a timestamp.
REPORT_OUTPUT_DIRECTORY="/mnt/backups/reports"

# REPORT_FORMAT
# Output format for generated reports.
# Accepted values: markdown, json
# markdown produces a human-readable report suitable for tickets and records.
# json produces machine-readable output for integration with other tools.
REPORT_FORMAT="markdown"

# INCLUDE_FILE_LIST
# If "true", the report includes a full list of backed-up files.
# Produces very large reports for large source paths.
# Recommended: "false" for routine reporting.
# Enable selectively for audit runs.
INCLUDE_FILE_LIST="false"


# -----------------------------------------------------------------------------
# NOTIFICATIONS - Optional email alerting
# -----------------------------------------------------------------------------
# Leave SMTP_SERVER blank to disable email notifications entirely.
# Notifications are sent using the local mail transfer agent (MTA) or
# a configured SMTP relay via the mail command.
# Requires mailx or s-nail to be installed:
#   sudo dnf install s-nail -y

# SMTP_SERVER
# SMTP relay hostname or IP address.
# Leave blank to disable notifications.
# Example: "mail.yourdomain.local"
SMTP_SERVER=""

# SMTP_PORT
# SMTP port number.
# Common values: 25 (unauthenticated relay), 587 (STARTTLS), 465 (SSL)
SMTP_PORT="25"

# NOTIFICATION_FROM
# From address for notification emails.
# Must be accepted by your SMTP relay.
NOTIFICATION_FROM="backup@yourdomain.local"

# NOTIFICATION_TO
# Space-separated list of recipient addresses.
# Example: "sysadmin@yourdomain.local ops@yourdomain.local"
NOTIFICATION_TO="sysadmin@yourdomain.local"

# NOTIFY_ON_SUCCESS
# Send a notification email on successful backup completion.
# Enabling this for daily backups generates high notification volume.
# Recommended: "false"
NOTIFY_ON_SUCCESS="false"

# NOTIFY_ON_FAILURE
# Send a notification email when a backup run exits with errors.
# Recommended: "true"
NOTIFY_ON_FAILURE="true"